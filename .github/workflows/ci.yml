name: CI

on:
  push:
  pull_request:
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  frontend:
    name: Frontend (${{ matrix.app }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [arena, web]
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Bun
        uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install workspace dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck ${{ matrix.app }}
        run: |
          cd apps/${{ matrix.app }}
          bun run type

      - name: Lint ${{ matrix.app }}
        run: |
          cd apps/${{ matrix.app }}
          bunx biome check .

      - name: Build ${{ matrix.app }}
        run: |
          cd apps/${{ matrix.app }}
          bun run build

  engine:
    name: Engine
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/engine
    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Set up uv
        uses: astral-sh/setup-uv@v8.1.0
        with:
          enable-cache: true

      - name: Sync engine dependencies
        run: uv sync --locked

      - name: Ruff check
        run: uv run --with ruff ruff check .

      - name: Ty check
        run: uv run --with ty ty check .
